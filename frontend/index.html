<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAS - Login TecNM</title>
    <link rel="stylesheet" href="assets/CSS/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- IMPORTANTE: Agregamos SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>
    <div class="login-container">
        <div class="login-box">
            <div class="header">
                <img src="assets/IMG/Logo_TEC2.png" alt="Logo TecNM" class="logo">
                <h1>SIGAS</h1>
                <p>Sistema de Gestion de Activos</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label for="usuario">Nombre de Usuario</label>
                    <input type="text" id="usuario" name="nombre" placeholder="Ingresa tu nombre" required>
                </div>

                <div class="input-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="pass" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login">Entrar al Sistema</button>
            </form>

            <div class="footer">
                <span>TecNM - Instituto Tecnológico de Saltillo</span>
            </div>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        
        // Configuración global para los Toasts de error
        const ToastError = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nombre = document.getElementById('usuario').value;
            const passInput = document.getElementById('password');
            const pass = passInput.value;

            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nombre, pass })
                });

                const contentType = response.headers.get("content-type");
                
                if (contentType && contentType.indexOf("application/json") !== -1) {
                    const result = await response.json();

                    if (result.success) {
                        // 1. Guardamos la información necesaria para el menú
                        localStorage.setItem('userRole', result.user.Roles_ID_roles);
                        localStorage.setItem('userName', result.user.Nombre);
                        localStorage.setItem('showWelcome', 'true');

                        // 2. Redirección inmediata (el mensaje saldrá en menu.html)
                        window.location.href = "menu.html"; 
                    } else {
                        // 3. Toast de error (estilo image_fe347c.png)
                        ToastError.fire({
                            icon: 'error',
                            title: result.message || 'Credenciales inválidas'
                        });
                        // Limpiar solo la contraseña
                        passInput.value = "";
                    }
                } else {
                    console.error("El servidor no respondió con JSON");
                }

            } catch (error) {
                console.error("Error al conectar:", error);
                ToastError.fire({
                    icon: 'error',
                    title: 'No hay conexión con el servidor'
                });
            }
        });
    </script>
</body>
</html>
