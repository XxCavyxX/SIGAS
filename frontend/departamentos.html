<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAS - Gestión de Departamentos</title>
    <link rel="stylesheet" href="assets/css/style_departamentos.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <header class="header-institucional">
        <div class="logos-container">
            <img src="assets/IMG/Logo_TEC2.png" alt="Logo ITS" class="logo-img">
            <h1>Instituto Tecnológico de Saltillo</h1>
            <img src="assets/IMG/TecNM_logo.png" alt="Logo TecNM" class="logo-img">
        </div>
        <div class="banner-maroon">
            <span class="left">Menu</span>
            <span class="right">Departamentos</span>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <div class="input-group">
                <div class="field">
                    <label>Nombre de Departamento</label>
                    <input type="text" id="nombreDepto" placeholder="Escribe el nombre...">
                </div>
                
                <div class="button-column">
                    <button type="button" id="btnGuardar" class="btn-action">Guardar</button>
                    <button type="button" id="btnActualizar" class="btn-action">Actualizar</button>
                    <button type="button" id="btnBorrar" class="btn-action">Borrar</button>
                </div>
            </div>
        </section>

        <section class="table-section">
            <h2 class="table-title">Departamentos</h2>
            <div class="table-wrapper">
                <table id="tabla-departamentos">
                    <thead>
                        <tr>
                            <th style="width: 20%;">ID</th>
                            <th>Nombre del Departamento</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="assets/js/gestionar_departamentos.js"></script>
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 1000;"></div>
</body>
</html>
